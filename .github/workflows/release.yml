name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Verify tag and manifest version
        run: test "${GITHUB_REF_NAME}" = "$(node -p "require('./manifest.json').version")"
      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/main.js
            manifest.json
            styles.css
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/main.js
            manifest.json
            styles.css
